<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFlow PM</title>
    <!-- PERF: Removed unused font weights, kept only essential ones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" loading="lazy">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f1419;
            color: #e2e8f0;
            font-family: 'Inter Tight', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f1419;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #1a2029;
            border-top-color: #0ee4d5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #app {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #app.loaded {
            opacity: 1;
        }
        .error-banner {
            background-color: #7f1d1d;
            color: #fecaca;
            padding: 12px 20px;
            text-align: center;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">
        <!-- PERF: Added explicit width/height to prevent layout shift -->
        <div class="loading-spinner" style="width:48px;height:48px"></div>
        <p>Loading TeamFlow PM...</p>
    </div>

    <div id="app">
        <!-- Content will be rendered by app.js -->
    </div>

    <!-- PERF: Added defer for non-critical script -->
    <script type="module" src="app.js" defer></script>
</body>
</html>
